<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="/css/loginstyle.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>


<body>


<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>



<div class="login-card">

    <!-- LEFT -->
    <div class="login-left">


        <div class="brand">

            <div class="brand-dot"></div>

            <span class="brand-name">
                SecurePay
</span>

        </div>



        <h1 class="heading">

            Welcome
            <br>

            <em>
                back.
            </em>

        </h1>


        <p class="subheading">

            Sign in to continue your journey.

        </p>




        <form id="loginForm">


            <div class="input-group">

                <label>
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       placeholder="you@example.com"
                       required>

            </div>



            <div class="input-group password-wrapper">

                <label>
                    Password
                </label>

                <input type="password"
                       name="password"
                       id="password"
                       placeholder="Enter your password"
                       required>

                <span class="toggle-password"
                      onclick="togglePassword()">

👁️

</span>

            </div>




            <div class="input-group otp-group"
                 id="otpGroup">

                <label>
                    One-Time Password
                </label>

                <input type="text"
                       name="otp"
                       maxlength="6"
                       placeholder="000000">

            </div>



            <button type="submit"
                    class="login-button">

                Sign In

            </button>



            <div class="register-link">

                New here?

                <a href="/register-page">

                    Create an account →

                </a>

            </div>


        </form>


    </div>





    <!-- RIGHT -->

    <div class="login-right">


        <div class="right-inner">


            <div class="illustration-wrap">


                <img src="/css/images/onlien.png"
                     alt="Illustration">



                <div class="orbit">

                    <div class="orbit-dot"></div>

                </div>


            </div>



            <p class="right-tagline">

                Your world,

                <br>

                <em>

                    one login away.

                </em>

            </p>



            <p class="right-sub">

                Secure, seamless, and always there when you need it.

            </p>



            <div class="pills">

<span class="pill">
🔐 Encrypted
</span>

                <span class="pill">
⚡ Instant Access
</span>

                <span class="pill">
📧 OTP Verified
</span>

            </div>


        </div>

    </div>

</div>




<script>

    const form =
        document.getElementById("loginForm");

    const otpGroup =
        document.getElementById("otpGroup");



    form.addEventListener(
        "submit",

        async function(e){

            e.preventDefault();


            const email =
                form.email.value;


            const password =
                form.password.value;


            const otp =
                form.otp?.value || "";



            const response =
                await fetch(

                    "/api/users/login",

                    {

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body: JSON.stringify({

                            email,
                            password,
                            otp

                        })

                    }

                );



            const result =
                await response.json();



            if(result.message.includes("OTP sent")){

                alert("OTP sent");

                otpGroup.classList.add("visible");

            }


            else if(result.message.includes("Login successful")){

                window.location.href="/dashboard";

            }


            else{

                alert(result.message);

            }

        }

    );




    function togglePassword(){

        const input =
            document.getElementById("password");


        if(input.type==="password"){

            input.type="text";

        }

        else{

            input.type="password";

        }

    }


</script>



</body>

</html>
