<head>
    <meta charset="UTF-8">
    <title>SecurePay | Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        /* remove white dropdown gap */
        #payMode {

            background-color: #14131e;

            color: #fffcf5;

            border:1px solid rgba(201,168,76,.18);

        }

        #payMode option {

            background:#14131e;

            color:#fffcf5;

        }

    </style>

</head>

<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="shell">

    <aside>

        <div class="sidebar-brand">
            <div class="brand-dot"></div>
            <span class="brand-name">SecurePay</span>
        </div>

        <div class="user-card">

            <div class="user-avatar" id="sidebar-avatar">U</div>

            <div class="user-info">

                <div class="user-name" th:text="${userName}" id="sidebar-name">User</div>

                <div class="user-email" th:text="${userEmail}" id="sidebar-email">user@example.com</div>

            </div>

        </div>

        <p class="sidebar-label">Menu</p>

        <nav>

            <button class="nav-item active" id="nav-make" onclick="showSection('makeTransaction')">

                <span class="nav-icon">✦</span> Make Transaction

            </button>

            <button class="nav-item" id="nav-history" onclick="showSection('transactionHistory')">

                <span class="nav-icon">◈</span> Transaction History

            </button>

        </nav>

        <div class="sidebar-footer">

            <a class="logout-btn" href="/login-page">

                <span>⎋</span> Logout

            </a>

        </div>

    </aside>

    <main>

        <div class="topbar">

            <div>

                <h1 class="page-title">

                    Welcome, <em th:text="${userName}" id="welcome-name">User</em>

                </h1>

            </div>

            <div class="topbar-date" id="current-date"></div>

        </div>

        <div class="stats">

            <div class="stat-card">

                <div class="stat-label">Total Transactions</div>

                <div class="stat-value gold" id="stat-total">—</div>

            </div>

            <div class="stat-card">

                <div class="stat-label">Total Spent</div>

                <div class="stat-value gold" id="stat-volume">—</div>

            </div>

            <div class="stat-card">

                <div class="stat-label">Flagged</div>

                <div class="stat-value red" id="stat-flagged">—</div>

            </div>

            <div class="stat-card">

                <div class="stat-label">Clean</div>

                <div class="stat-value green" id="stat-clean">—</div>

            </div>

        </div>

        <section id="makeTransaction" class="active">

            <h2 class="section-heading">

                New <em>Transaction</em>

            </h2>

            <div class="glass-card">

                <form class="tx-form" id="createTransactionForm">

                    <div class="form-row">

                        <div class="input-group">

                            <label for="amount">Amount</label>

                            <div class="input-wrap">

                                <span class="input-prefix">₹</span>

                                <input
                                        type="number"
                                        id="amount"
                                        placeholder="0.00"
                                        min="1"
                                        step="0.01"
                                        required>

                            </div>

                        </div>

                        <div class="input-group">

                            <label for="description">Description</label>

                            <input
                                    type="text"
                                    id="description"
                                    placeholder="e.g. Rent, Invoice #123…"
                                    required>

                        </div>

                    </div>

                    <div class="input-group">

                        <label for="payMode">Pay Mode</label>

                        <select id="payMode" required>

                            <option value="">Select Pay Mode</option>

                            <option value="UPI">UPI</option>

                            <option value="CARD">CARD</option>

                            <option value="NETBANKING">NETBANKING</option>

                        </select>

                    </div>

                    <button type="submit" class="submit-btn">

                        Send Payment

                    </button>

                    <div class="status-msg" id="create-status"></div>

                </form>

            </div>

        </section>

        <section id="transactionHistory">

            <h2 class="section-heading">

                Transaction <em>History</em>

            </h2>

            <div class="glass-card">

                <form class="filter-row" id="filterForm">

                    <div class="filter-group">

                        <label for="start">Start Date</label>

                        <input type="date" id="start">

                    </div>

                    <div class="filter-group">

                        <label for="end">End Date</label>

                        <input type="date" id="end">

                    </div>

                    <button type="submit" class="filter-btn">

                        Apply Filters

                    </button>

                    <button
                            type="button"
                            class="filter-btn"
                            id="clear-filter"
                            style="background:transparent;color:var(--muted);border-color:var(--border)">

                        Clear

                    </button>

                </form>

                <div class="table-wrap">

                    <table>

                        <thead>

                        <tr>

                            <th>ID</th>

                            <th>Amount</th>

                            <th>Description</th>

                            <th>Pay Mode</th>

                            <th>Timestamp</th>

                            <th>Status</th>

                            <th>Reason</th>

                        </tr>

                        </thead>

                        <tbody id="transactionTableBody">

                        <tr>

                            <td colspan="7"

                                style="padding:50px;text-align:center;color:var(--muted)">

                                Loading transactions…

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

</div>

<div class="toast" id="toast"></div>

<script>

    document.getElementById('current-date').textContent =

        new Date().toLocaleDateString('en-IN',{

            weekday:'long',

            year:'numeric',

            month:'long',

            day:'numeric'

        });

    /* stats */

    function updateStats(txns){

        document.getElementById('stat-total').textContent = txns.length;

        const flagged = txns.filter(t => t.flagged).length;

        document.getElementById('stat-flagged').textContent = flagged;

        document.getElementById('stat-clean').textContent = txns.length - flagged;

        const total = txns.reduce((sum,t)=>sum+(parseFloat(t.amount)||0),0);

        document.getElementById('stat-volume').textContent =

            '₹'+total.toLocaleString('en-IN');

    }

    /* create */

    document.getElementById('createTransactionForm')

        .addEventListener('submit',async(e)=>{

            e.preventDefault();

            const amount=document.getElementById('amount').value;

            const description=document.getElementById('description').value;

            const payMode=document.getElementById('payMode').value;

            const res = await fetch('/api/transaction',{

                method:'POST',

                headers:{'Content-Type':'application/json'},

                body:JSON.stringify({

                    amount,

                    description,

                    payMode

                })

            });

            if(res.ok){

                document.getElementById('amount').value='';

                document.getElementById('description').value='';

                document.getElementById('payMode').value='';

                fetchTransactions();

            }

        });
    function showSection(sectionId) {

        document.getElementById('makeTransaction').classList.remove('active');
        document.getElementById('transactionHistory').classList.remove('active');

        document.getElementById(sectionId).classList.add('active');

        document.getElementById('nav-make').classList.remove('active');
        document.getElementById('nav-history').classList.remove('active');

        if (sectionId === 'makeTransaction') {
            document.getElementById('nav-make').classList.add('active');
        }

        if (sectionId === 'transactionHistory') {
            document.getElementById('nav-history').classList.add('active');
            fetchTransactions(); // loads table + stats
        }

    }

    /* fetch */

    async function fetchTransactions(){

        const res = await fetch('/api/transactions');

        const data = await res.json();

        updateStats(data);

        renderTransactions(data);

    }

    /* table */

    function renderTransactions(data){

        const tbody=document.getElementById('transactionTableBody');

        tbody.innerHTML='';

        data.forEach(txn=>{

            const row=document.createElement('tr');

            row.innerHTML=`

<td>#${txn.id}</td>

<td>₹${Number(txn.amount).toLocaleString('en-IN')}</td>

<td>${txn.description||'-'}</td>

<td>${txn.payMode||'-'}</td>

<td>${new Date(txn.timestamp).toLocaleString('en-IN')}</td>

<td>${txn.flagged?'Flagged':'Clean'}</td>

<td>${txn.fraudReason||'-'}</td>

`;

            tbody.appendChild(row);

        });

    }

    fetchTransactions();

</script>

</body>

</html>
