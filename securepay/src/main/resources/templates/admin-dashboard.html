<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>SecurePay | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white p-6">
        <h2 class="text-2xl font-bold mb-6">Admin Dashboard</h2>
        <ul>
            <li class="mb-4"><a href="#" class="hover:underline">All Transactions</a></li>
            <li><a href="/logout" class="hover:underline">Logout</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
        <h1 class="text-3xl font-semibold mb-4">All User Transactions</h1>

        <div id="transaction-list" class="grid gap-4"></div>
    </main>
</div>

<!-- Admin JS -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const transactionList = document.getElementById('transaction-list');

        function fetchTransactions() {
            fetch('/api/admin/transactions', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include'
            })
                .then(res => {
                    if (res.status === 403) {
                        alert("You are not authorized to view this page.");
                        return [];
                    }
                    return res.json();
                })
                .then(data => renderTransactions(data))
                .catch(err => console.error("Fetch error:", err));
        }

        function renderTransactions(transactions) {
            transactionList.innerHTML = ''; // clear list
            transactions.forEach(tx => {
                const card = document.createElement('div');
                card.className = 'bg-white p-4 shadow rounded-lg';

                card.innerHTML = `
                    <p><strong>User:</strong> ${tx.userEmail}</p>
                    <p><strong>Amount:</strong> ₹${tx.amount}</p>
                    <p><strong>Description:</strong> ${tx.description}</p>
                    <p><strong>Date:</strong> ${tx.date}</p>
                    <p><strong>Flagged:</strong> ${tx.flagged ? 'Yes' : 'No'}</p>
                    <div class="mt-2 flex flex-wrap gap-2">
                        <input type="text" placeholder="Flag reason" class="flag-reason border p-1 rounded w-2/3" />
                        <button class="flag-btn bg-red-600 text-white px-3 py-1 rounded" data-id="${tx.id}">
                            Flag
                        </button>
                        <button class="delete-btn bg-gray-700 text-white px-3 py-1 rounded ml-auto" data-id="${tx.id}">
                            Delete
                        </button>
                    </div>
                `;

                transactionList.appendChild(card);
            });

            // Flag buttons
            document.querySelectorAll('.flag-btn').forEach(button => {
                button.addEventListener('click', function () {
                    const txId = this.dataset.id;
                    const reason = this.previousElementSibling.value.trim();

                    if (!reason) {
                        alert("Please enter a reason.");
                        return;
                    }

                    flagTransaction(txId, reason);
                });
            });

            // Delete buttons
            document.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', function () {
                    const txId = this.dataset.id;
                    if (confirm("Are you sure you want to delete this transaction?")) {
                        deleteTransaction(txId);
                    }
                });
            });
        }

        function flagTransaction(id, reason) {
            fetch('/api/admin/flag', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    transactionId: id,
                    reason: reason
                })
            })
                .then(res => {
                    if (res.ok) {
                        alert("Transaction flagged successfully.");
                        fetchTransactions();
                    } else {
                        alert("Error flagging transaction.");
                    }
                });
        }

        function deleteTransaction(id) {
            fetch('/api/admin/transaction/' + id, {
                method: 'DELETE',
                credentials: 'include'
            })
                .then(res => {
                    if (res.ok) {
                        alert("Transaction deleted.");
                        fetchTransactions();
                    } else {
                        alert("Error deleting transaction.");
                    }
                });
        }

        // Load data initially
        fetchTransactions();
    });
</script>
</body>
</html>
